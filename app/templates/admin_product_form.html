{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='css/admin_products.css') }}">
{% endblock %}

{% block content %}
<div class="admin-form">
    <h1 class="admin-form-title">{{ page_title }}</h1>

    {% if request.query_params.get("error") == "duplicate_product" %}
        <div class="admin-error">
            Product with this slug and edition already exists.
        </div>
    {% endif %}

    <form method="post" action="{{ form_action }}" class="admin-form-body">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ product.name if product else '' }}" required>
        </div>

        <div class="form-group">
            <label>Slug</label>
            <input type="text" name="slug" value="{{ product.slug if product else '' }}" required>
        </div>

        <div class="form-group">
            <label>Product family</label>
            <input
                type="text"
                name="family_slug"
                value="{{ product.family_slug if product else '' }}"
                required
                placeholder="e.g. smartbudget"
            >
        </div>

        <div class="form-group">
            <label>Edition</label>
            <select name="edition" required>
                {% for e in allowed_editions %}
                <option value="{{ e }}"
                    {% if product and product.edition == e %}selected{% endif %}>
                    {{ e }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" step="0.01" name="price"
                   value="{{ active_price.amount if active_price else '' }}" required>
        </div>

        <div class="form-group">
            <label>Currency</label>
            <select name="currency_code" required>
                <option value="RUB"
                    {% if active_price and active_price.currency_code == "RUB" %}selected{% elif not active_price %}selected{% endif %}>
                    RUB
                </option>
                <option value="EUR"
                    {% if active_price and active_price.currency_code == "EUR" %}selected{% endif %}>
                    EUR
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status" required>
                {% for s in allowed_statuses %}
                <option value="{{ s }}"
                    {% if product and product.status == s %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save</button>
        </div>

    </form>
</div>
{% endblock %}
